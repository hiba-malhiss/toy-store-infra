api:
  dashboard: false   # set true + add auth label if you want the Traefik UI

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false   # containers must opt-in with traefik.enable=true
    network: traefik-public

certificatesResolvers:
  letsencrypt:
    acme:
      email: salhab.amjad.443@gmail.com
      storage: /acme.json
      httpChallenge:
        entryPoint: web
