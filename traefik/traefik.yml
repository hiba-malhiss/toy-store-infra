api:
  dashboard: false   # set true + add auth label if you want the Traefik UI

entryPoints:
  web:
    address: ":8080"    # TODO: change back to :80 once old nginx is removed
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":8443"    # TODO: change back to :443 once old nginx is removed

providers:
  docker:
    exposedByDefault: false   # containers must opt-in with traefik.enable=true
    network: traefik-public

certificatesResolvers:
  letsencrypt:
    acme:
      email: your-email@example.com   # change this — Let's Encrypt sends expiry notices here
      storage: /acme.json
      httpChallenge:
        entryPoint: web
