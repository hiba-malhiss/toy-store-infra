# Shared reverse proxy — run ONCE on server setup, never per-customer.
#
# First-time setup:
#   touch acme.json && chmod 600 acme.json
#   docker network create traefik-public
#   docker compose up -d

services:
  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    ports:
      - "8080:8080"     # TODO: change back to 80:80 once old nginx is removed
      - "8443:8443"     # TODO: change back to 443:443 once old nginx is removed
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro   # watch containers
      - ./traefik.yml:/traefik.yml:ro                  # static config
      - ./acme.json:/acme.json                         # SSL cert storage
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
