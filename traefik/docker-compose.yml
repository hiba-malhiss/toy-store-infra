# Shared reverse proxy — run ONCE on server setup, never per-customer.
#
# First-time setup:
#   touch acme.json && chmod 600 acme.json
#   docker network create traefik-public
#   docker compose up -d

services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro   # watch containers
      - ./traefik.yml:/traefik.yml:ro                  # static config
      - ./acme.json:/acme.json                         # SSL cert storage
    networks:
      - traefik-public

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer-data:/data
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.kidotoysco.com`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
      # Basic auth — password hashed with bcrypt (each $ doubled for compose escaping)
      - "traefik.http.middlewares.portainer-auth.basicauth.users=admin:$$2y$$05$$Fl4dxRoO8VoSjtChFakz4.83zxfs2/aWmGrPzUtECtFLRd8oVcqwW"
      - "traefik.http.routers.portainer.middlewares=portainer-auth"

volumes:
  portainer-data:

networks:
  traefik-public:
    external: true
