# Custom domain override -- merged automatically by deploy.sh
# when CUSTOM_DOMAIN is set in the customer .env.
#
# Adds extra Traefik routers so the customer domain resolves
# to the same containers, while the subdomain (STORE_DOMAIN) stays active.
#
# Customer DNS requirements (add at their domain registrar):
#   CUSTOM_DOMAIN       --> A record pointing to VPS IP (82.180.155.197)
#   CUSTOM_ADMIN_DOMAIN --> A record pointing to VPS IP (82.180.155.197)

services:

  backend:
    environment:
      # Include custom domain in CORS allowed origins
      CORS_ALLOWED_ORIGINS: "https://${STORE_DOMAIN},https://${ADMIN_DOMAIN},https://${CUSTOM_DOMAIN},https://${CUSTOM_ADMIN_DOMAIN}"
    labels:
      - "traefik.http.routers.${CUSTOMER_NAME}-api-custom.rule=Host(`${CUSTOM_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.${CUSTOMER_NAME}-api-custom.entrypoints=websecure"
      - "traefik.http.routers.${CUSTOMER_NAME}-api-custom.tls.certresolver=letsencrypt"
      - "traefik.http.services.${CUSTOMER_NAME}-api-custom.loadbalancer.server.port=8080"

  store:
    labels:
      - "traefik.http.routers.${CUSTOMER_NAME}-store-custom.rule=Host(`${CUSTOM_DOMAIN}`)"
      - "traefik.http.routers.${CUSTOMER_NAME}-store-custom.entrypoints=websecure"
      - "traefik.http.routers.${CUSTOMER_NAME}-store-custom.tls.certresolver=letsencrypt"
      - "traefik.http.services.${CUSTOMER_NAME}-store-custom.loadbalancer.server.port=80"
      - "traefik.http.routers.${CUSTOMER_NAME}-store-custom.priority=1"

  admin:
    labels:
      - "traefik.http.routers.${CUSTOMER_NAME}-admin-custom.rule=Host(`${CUSTOM_ADMIN_DOMAIN}`)"
      - "traefik.http.routers.${CUSTOMER_NAME}-admin-custom.entrypoints=websecure"
      - "traefik.http.routers.${CUSTOMER_NAME}-admin-custom.tls.certresolver=letsencrypt"
      - "traefik.http.services.${CUSTOMER_NAME}-admin-custom.loadbalancer.server.port=80"

  game:
    labels:
      - "traefik.http.routers.${CUSTOMER_NAME}-game-custom.rule=Host(`${CUSTOM_DOMAIN}`) && PathPrefix(`/game`)"
      - "traefik.http.routers.${CUSTOMER_NAME}-game-custom.entrypoints=websecure"
      - "traefik.http.routers.${CUSTOMER_NAME}-game-custom.tls.certresolver=letsencrypt"
      - "traefik.http.services.${CUSTOMER_NAME}-game-custom.loadbalancer.server.port=80"
      - "traefik.http.middlewares.${CUSTOMER_NAME}-game-strip-custom.stripprefix.prefixes=/game"
      - "traefik.http.routers.${CUSTOMER_NAME}-game-custom.middlewares=${CUSTOMER_NAME}-game-strip-custom"
